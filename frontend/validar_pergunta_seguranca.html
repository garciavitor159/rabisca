<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rabisca - Valide sua pergunta de segurança</title>
    <!-- Favicon -->
    <link rel="icon" href="imgs/favicon.svg" type="image/svg+xml" />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/conteudos_principais.css" />
    <link rel="stylesheet" href="css/titulos.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- JavaScript -->
    <script type="module" src="js/scripts.js"></script>
    <script type="module" src="js/excluir_sessoes_autorizacao.js"></script>
    <script type="module" src="js/validar_pergunta_seguranca.js"></script>
  </head>
  <body>
    <!-- Cabeçalho -->
    <header>
      <div class="container-logo">
        <img src="imgs/logo.svg" alt="Logo do Rabisca" class="logo" />
        <h1 class="titulo-principal">Rabisca</h1>
      </div>
      <nav class="navbar">
        <button
          id="botaoAbrirSidebar"
          class="botao-alternar-sidebar botao-abrir-sidebar"
        >
          <i class="bi bi-list"></i>
        </button>
        <ul class="lista-navbar">
          <li>
            <a href="index.html" class="link-navbar"
              ><i class="bi bi-house"></i> Home</a
            >
          </li>
          <li>
            <a href="cadastrar_usuario.html" class="link-navbar"
              ><i class="bi bi-person-add"></i> Cadastre-se</a
            >
          </li>
          <li>
            <a href="login.html" class="link-navbar"
              ><i class="bi bi-box-arrow-in-right"></i> Login</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <!-- Conteúdo principal -->
    <main class="conteudo-principal">
      <h2 class="titulo">
        Valide sua pergunta de segurança <i class="bi bi-check-square"></i>
      </h2>
      <form id="form" novalidate>
        <div class="container-campo">
          <label for="email" class="label"
            >E-mail: <span class="campo-obrigatorio">*</span></label
          >
          <input
            type="email"
            name="email"
            id="email"
            class="campo"
            placeholder="Digite seu e-mail"
            maxlength="80"
            required
          />
        </div>
        <div class="container-campo">
          <label for="perguntaSeguranca" class="label"
            >Pergunta de segurança:
            <span class="campo-obrigatorio">*</span></label
          >
          <select
            name="pergunta_seguranca"
            id="perguntaSeguranca"
            class="campo"
            required
          >
            <option value="">Selecione uma pergunta</option>
            <option value="0">
              Qual foi o nome do seu primeiro professor favorito?
            </option>
            <option value="1">
              Qual foi o primeiro filme que você assistiu no cinema?
            </option>
            <option value="2">
              Qual é o nome da rua onde morava seu melhor amigo de infância?
            </option>
            <option value="3">
              Qual foi o apelido mais estranho que você já teve?
            </option>
          </select>
        </div>
        <div class="container-campo">
          <label for="resposta" class="label"
            >Resposta: <span class="campo-obrigatorio">*</span></label
          >
          <input
            type="text"
            name="resposta"
            id="resposta"
            class="campo"
            placeholder="Digite a resposta da pergunta acima"
            maxlength="70"
            required
          />
        </div>
        <button type="submit" class="botao botao-enviar">
          Validar <i class="bi bi-check-square"></i>
        </button>
      </form>
    </main>
    <!-- Barra lateral -->
    <div id="overlaySidebar" class="overlay escondido"></div>
    <nav id="sidebar" class="sidebar escondido">
      <button
        id="botaoFecharSidebar"
        class="botao-alternar-sidebar botao-fechar-sidebar"
      >
        <i class="bi bi-x-lg"></i>
      </button>
      <ul class="lista-sidebar">
        <li>
          <a href="index.html" class="link-sidebar"
            ><i class="bi bi-house"></i> Home</a
          >
        </li>
        <li>
          <a href="cadastrar_usuario.html" class="link-sidebar"
            ><i class="bi bi-person-add"></i> Cadastre-se</a
          >
        </li>
        <li>
          <a href="login.html" class="link-sidebar"
            ><i class="bi bi-box-arrow-in-right"></i> Login</a
          >
        </li>
      </ul>
    </nav>
    <!-- Modal de mensagens -->
    <div id="overlayModalMsgs" class="overlay escondido"></div>
    <div id="modalMsgs" class="modal escondido">
      <h3 class="titulo-modal">
        Atenção <i class="bi bi-exclamation-triangle"></i>
      </h3>
      <p id="txtModalMsgs" class="txt-modal"></p>
      <button id="botaoFecharModalMsgs" class="botao botao-fechar-modal">
        Fechar <i class="bi bi-x-square"></i>
      </button>
    </div>
    <!-- Rodapé -->
    <footer class="rodape">
      <p id="copyright" class="copyright">
        &copy; <span>2025</span> Rabisca - Todos os direitos reservados.
      </p>
    </footer>
  </body>
</html>
