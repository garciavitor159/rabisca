<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rabisca - O seu bloco de notas online</title>
    <!-- Favicon -->
    <link rel="icon" href="imgs/favicon.svg" type="image/svg+xml" />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/botoes_cta.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/links.css" />
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- JavaScript -->
    <script type="module" src="js/scripts.js"></script>
    <script type="module" src="js/excluir_sessoes_autorizacao.js"></script>
  </head>
  <body>
    <!-- Cabeçalho -->
    <header>
      <div class="container-logo">
        <img src="imgs/logo.svg" alt="Logo do Rabisca" class="logo" />
        <h1 class="titulo-principal">Rabisca</h1>
      </div>
      <nav class="navbar">
        <button
          id="botaoAbrirSidebar"
          class="botao-alternar-sidebar botao-abrir-sidebar"
        >
          <i class="bi bi-list"></i>
        </button>
        <ul class="lista-navbar">
          <li>
            <a href="index.html" class="link-navbar"
              ><i class="bi bi-house"></i> Home</a
            >
          </li>
          <li>
            <a href="cadastrar_usuario.html" class="link-navbar"
              ><i class="bi bi-person-add"></i> Cadastre-se</a
            >
          </li>
          <li>
            <a href="login.html" class="link-navbar"
              ><i class="bi bi-box-arrow-in-right"></i> Login</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <!-- Conteúdo principal -->
    <main class="conteudo-principal">
      <section class="secao-intro">
        <h2 class="titulo-secao-intro">
          Suas anotações, sempre ao seu alcance
        </h2>
        <p class="txt-secao-intro">
          Tire suas ideias da cabeça sem complicações.
          <i class="bi bi-emoji-smile"></i>
        </p>
        <div class="container-botoes-cta">
          <a href="cadastrar_usuario.html" class="botao botao-cta"
            >Cadastre-se <i class="bi bi-person-add"></i
          ></a>
          <a href="login.html" class="botao botao-cta"
            >Login <i class="bi bi-box-arrow-in-right"></i
          ></a>
        </div>
      </section>
      <figure class="container-img-destaque">
        <img
          src="imgs/bloco_notas.svg"
          alt="Pessoa fazendo anotações em um bloco de notas"
          class="img-destaque"
        />
        <figcaption class="legenda-img-destaque">
          Créditos da imagem:
          <a href="https://storyset.com/work" target="_blank" class="link"
            >Storyset</a
          >
        </figcaption>
      </figure>
    </main>
    <!-- Barra lateral -->
    <div id="overlaySidebar" class="overlay escondido"></div>
    <nav id="sidebar" class="sidebar escondido">
      <button
        id="botaoFecharSidebar"
        class="botao-alternar-sidebar botao-fechar-sidebar"
      >
        <i class="bi bi-x-lg"></i>
      </button>
      <ul class="lista-sidebar">
        <li>
          <a href="index.html" class="link-sidebar"
            ><i class="bi bi-house"></i> Home</a
          >
        </li>
        <li>
          <a href="cadastrar_usuario.html" class="link-sidebar"
            ><i class="bi bi-person-add"></i> Cadastre-se</a
          >
        </li>
        <li>
          <a href="login.html" class="link-sidebar"
            ><i class="bi bi-box-arrow-in-right"></i> Login</a
          >
        </li>
      </ul>
    </nav>
    <!-- Modal de mensagens -->
    <div id="overlayModalMsgs" class="overlay escondido"></div>
    <div id="modalMsgs" class="modal escondido">
      <h3 class="titulo-modal">
        Atenção <i class="bi bi-exclamation-triangle"></i>
      </h3>
      <p id="txtModalMsgs" class="txt-modal"></p>
      <button id="botaoFecharModalMsgs" class="botao botao-fechar-modal">
        Fechar <i class="bi bi-x-square"></i>
      </button>
    </div>
    <!-- Rodapé -->
    <footer class="rodape">
      <p id="copyright" class="copyright">
        &copy; <span>2025</span> Rabisca - Todos os direitos reservados.
      </p>
    </footer>
  </body>
</html>
