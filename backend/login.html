<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rabisca - Login</title>
    <!-- Favicon -->
    <link rel="icon" href="imgs/favicon.svg" type="image/svg+xml" />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="css/min/styles.min.css" />
    <link rel="stylesheet" href="css/min/conteudos_principais.min.css" />
    <link rel="stylesheet" href="css/min/titulos.min.css" />
    <link rel="stylesheet" href="css/min/forms.min.css" />
    <link rel="stylesheet" href="css/min/campos_senha.min.css" />
    <link rel="stylesheet" href="css/min/txts_alternar_forms.min.css" />
    <link rel="stylesheet" href="css/min/links.min.css" />
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- JavaScript -->
    <script type="module" src="js/min/scripts.min.js"></script>
    <script type="module" src="js/min/excluir_sessoes_autorizacao.min.js"></script>
    <script type="module" src="js/min/login.min.js"></script>
    <script type="module" src="js/min/alternar_senhas.min.js"></script>
  </head>
  <body>
    <!-- Cabeçalho -->
    <header>
      <div class="container-logo">
        <img src="imgs/logo.svg" alt="Logo do Rabisca" class="logo" />
        <h1 class="titulo-principal">Rabisca</h1>
      </div>
      <nav class="navbar">
        <button
          id="botaoAbrirSidebar"
          class="botao-alternar-sidebar botao-abrir-sidebar"
        >
          <i class="bi bi-list"></i>
        </button>
        <ul class="lista-navbar">
          <li>
            <a href="index.html" class="link-navbar"
              ><i class="bi bi-house"></i> Home</a
            >
          </li>
          <li>
            <a href="cadastrar_usuario.html" class="link-navbar"
              ><i class="bi bi-person-add"></i> Cadastre-se</a
            >
          </li>
          <li>
            <a href="login.html" class="link-navbar"
              ><i class="bi bi-box-arrow-in-right"></i> Login</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <!-- Conteúdo principal -->
    <main class="conteudo-principal">
      <h2 class="titulo">Login <i class="bi bi-box-arrow-in-right"></i></h2>
      <form id="form" novalidate>
        <div class="container-campo">
          <label for="email" class="label"
            >E-mail: <span class="campo-obrigatorio">*</span></label
          >
          <input
            type="email"
            name="email"
            id="email"
            class="campo"
            placeholder="Digite seu e-mail"
            maxlength="80"
            required
          />
        </div>
        <div class="container-campo">
          <label for="senha" class="label"
            >Senha: <span class="campo-obrigatorio">*</span></label
          >
          <div class="container-campo-senha">
            <input
              type="password"
              name="senha"
              id="senha"
              class="campo campo-senha"
              placeholder="Digite sua senha"
              minlength="8"
              maxlength="30"
              required
            />
            <button
              type="button"
              id="botaoAlternarSenha"
              class="botao-alternar-senha"
            >
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="botao botao-enviar">
          Login <i class="bi bi-box-arrow-in-right"></i>
        </button>
      </form>
      <p class="txt-alternar-forms">
        Ainda não tem conta?
        <a href="cadastrar_usuario.html" class="link">Cadastre-se!</a>
      </p>
      <p class="txt-alternar-forms">
        Esqueceu sua senha?
        <a href="validar_pergunta_seguranca.html" class="link">Clique aqui!</a>
      </p>
    </main>
    <!-- Barra lateral -->
    <div id="overlaySidebar" class="overlay escondido"></div>
    <nav id="sidebar" class="sidebar escondido">
      <button
        id="botaoFecharSidebar"
        class="botao-alternar-sidebar botao-fechar-sidebar"
      >
        <i class="bi bi-x-lg"></i>
      </button>
      <ul class="lista-sidebar">
        <li>
          <a href="index.html" class="link-sidebar"
            ><i class="bi bi-house"></i> Home</a
          >
        </li>
        <li>
          <a href="cadastrar_usuario.html" class="link-sidebar"
            ><i class="bi bi-person-add"></i> Cadastre-se</a
          >
        </li>
        <li>
          <a href="login.html" class="link-sidebar"
            ><i class="bi bi-box-arrow-in-right"></i> Login</a
          >
        </li>
      </ul>
    </nav>
    <!-- Modal de mensagens -->
    <div id="overlayModalMsgs" class="overlay escondido"></div>
    <div id="modalMsgs" class="modal escondido">
      <h3 class="titulo-modal">
        Atenção <i class="bi bi-exclamation-triangle"></i>
      </h3>
      <p id="txtModalMsgs" class="txt-modal"></p>
      <button id="botaoFecharModalMsgs" class="botao botao-fechar-modal-msgs">
        Fechar <i class="bi bi-x-square"></i>
      </button>
    </div>
    <!-- Rodapé -->
    <footer class="rodape">
      <p id="copyright" class="copyright">
        &copy; <span>2025</span> Rabisca - Todos os direitos reservados.
      </p>
    </footer>
  </body>
</html>
