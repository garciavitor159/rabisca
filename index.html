<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabisca - O seu bloco de notas online</title>
    <link rel="icon" href="imgs/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/principal.css">
    <link rel="stylesheet" href="css/botoes_cta.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/links.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/customizacoes.js"></script>
    <script src="js/utilitarios.js" defer></script>
    <script src="js/principal.js" defer></script>
    <script src="js/encerrar_sessao.js" defer></script>
</head>
<body>
    <header class="cabecalho">
        <img src="imgs/logo.svg" alt="Logotipo do Rabisca" class="logo">
        <h1 class="titulo-principal">Rabisca</h1>
    </header>

    <nav class="navbar">
        <button type="button" id="botaoAbrirSidebar" class="botao-alternar-sidebar botao-abrir-sidebar">
            <i class="bi bi-list"></i>
        </button>
        <ul class="lista-navbar">
            <li>
                <a href="index.html" class="link-navbar">
                    <i class="bi bi-house"></i> Home
                </a>
            </li>
            <li>
                <a href="criar_conta.html" class="link-navbar">
                    <i class="bi bi-person-add"></i> Criar conta
                </a>
            </li>
            <li>
                <a href="login.html" class="link-navbar">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </a>
            </li>
        </ul>
    </nav>

    <main class="conteudo-principal">
        <section class="secao-intro">
            <h2 class="titulo-secao-intro">Suas anotações, sempre ao seu alcance</h2>
            <p class="txt-secao-intro">
                Tire suas ideias da cabeça sem complicações. <i class="bi bi-emoji-smile"></i>
            </p>
            <div class="area-botoes-cta">
                <a href="criar_conta.html" class="botao botao-principal botao-cta">
                    Criar conta <i class="bi bi-person-add"></i>
                </a>
                <a href="login.html" class="botao botao-principal botao-cta">
                    Login <i class="bi bi-box-arrow-in-right"></i>
                </a>
            </div>
        </section>
        <figure class="area-img-destaque">
            <img src="imgs/bloco_notas.svg" alt="Pessoa fazendo anotações" class="img-destaque">
            <figcaption class="legenda-img-destaque">
                Ilustração por <a href="https://storyset.com/work" target="_blank" class="link">Storyset</a>
            </figcaption>
        </figure>
    </main>

    <div id="fundoSidebar" class="fundo escondido"></div>
    <nav id="sidebar" class="sidebar escondido">
        <button type="button" id="botaoFecharSidebar" class="botao-alternar-sidebar botao-fechar-sidebar">
            <i class="bi bi-x-lg"></i>
        </button>
        <ul class="lista-sidebar">
            <li>
                <a href="index.html" class="link-sidebar">
                    <i class="bi bi-house"></i> Home
                </a>
            </li>
            <li>
                <a href="criar_conta.html" class="link-sidebar">
                    <i class="bi bi-person-add"></i> Criar conta
                </a>
            </li>
            <li>
                <a href="login.html" class="link-sidebar">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </a>
            </li>
        </ul>
    </nav>

    <div id="fundoModalAlerta" class="fundo escondido"></div>
    <div id="modalAlerta" class="modal escondido">
        <h3 class="titulo-modal">
            Atenção <i class="bi bi-exclamation-triangle"></i>
        </h3>
        <p id="txtModalAlerta" class="txt-modal"></p>
        <button type="button" id="botaoFecharModalAlerta" class="botao botao-modal botao-fechar botao-fechar-modal-alerta">
            Fechar <i class="bi bi-x-square"></i>
        </button>
    </div>

    <footer class="rodape">
        <p id="creditos" class="creditos">
            <i class="bi bi-c-circle"></i> <span>2025</span> Rabisca - Todos os direitos reservados.
        </p>
    </footer>
</body>
</html>
